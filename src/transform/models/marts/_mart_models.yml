version: 2

models:
  # ────────────────────────────────────────────────────────────────────────────
  # mart_generacion_diaria
  # ────────────────────────────────────────────────────────────────────────────
  - name: mart_generacion_diaria
    description: >
      Generación eléctrica diaria del Sistema Eléctrico Nacional (SEN) de Chile,
      desglosada por tipo de tecnología y clasificación de fuente (Renovable /
      Convencional). Cada fila representa la producción de un tipo de tecnología
      en un día específico. Incluye métricas de generación (total MWh, promedio MW,
      máximo MW), cantidad de centrales activas, capacidad instalada, y factor
      de planta.
      Granularidad: 1 fila por día × tipo_tecnologia.
      Excluye centrales con estado distinto a 'normal'.
    columns:
      - name: fecha
        description: "Fecha del día de generación."
        tests:
          - not_null

      - name: tipo_tecnologia
        description: >
          Tipo de tecnología de generación (ej: Solar, Eolica, Térmica,
          Hidráulica de Embalse, etc.).
        tests:
          - not_null

      - name: clasificacion_fuente
        description: >
          Clasificación de la fuente: 'Renovable' (Solar, Eolica, Geotérmica,
          Biomasa, Mini Hidráulica, etc.) o 'Convencional' (Térmica, etc.).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Renovable", "Convencional"]

      - name: generacion_total_mwh
        description: >
          Total de energía generada en megawatt-hora (MWh) durante el día.
          Calculado como la suma de la generación horaria en MW (1 MW durante 1
          hora = 1 MWh).
        tests:
          - not_null

      - name: generacion_promedio_mw
        description: "Promedio de generación horaria en megawatts (MW) durante el día."

      - name: generacion_maxima_mw
        description: "Máximo de generación alcanzado en una hora del día (MW)."

      - name: horas_con_generacion
        description: >
          Número de horas-central con generación mayor a cero.
          Incluye todas las centrales de la tecnología.

      - name: num_centrales_activas
        description: "Cantidad de centrales distintas que generaron energía (>0 MW) durante el día."

      - name: capacidad_instalada_mw
        description: >
          Capacidad instalada total en MW para la tecnología en el día.
          Calculada como la suma de MAX(potencia_maxima_mw) por central.

      - name: factor_planta
        description: >
          Factor de planta (capacity factor): relación entre la energía
          efectivamente generada y la que se habría generado si todas las
          centrales operaran a potencia máxima las 24 horas.
          Fórmula: generacion_total_mwh / (capacidad_instalada_mw × 24).
          Rango esperado: 0.0 a 1.0.

  # ────────────────────────────────────────────────────────────────────────────
  # mart_generacion_por_central
  # ────────────────────────────────────────────────────────────────────────────
  - name: mart_generacion_por_central
    description: >
      Perfil de generación diaria por central del SEN. Cada fila representa
      el desempeño de una central específica en un día. Incluye generación
      total, promedio, máximo y mínimo horario, capacidad instalada, factor
      de planta, y horas de operación.
      Granularidad: 1 fila por día × id_central.
      Excluye centrales con estado distinto a 'normal'.
    columns:
      - name: fecha
        description: "Fecha del día."
        tests:
          - not_null

      - name: id_central
        description: "Identificador único de la central generadora."
        tests:
          - not_null

      - name: nombre_central
        description: "Nombre de la central generadora."
        tests:
          - not_null

      - name: tipo_tecnologia
        description: "Tipo de tecnología de generación."

      - name: clasificacion_fuente
        description: "Clasificación: 'Renovable' o 'Convencional'."
        tests:
          - accepted_values:
              arguments:
                values: ["Renovable", "Convencional"]

      - name: region
        description: "Región administrativa de Chile."

      - name: comuna
        description: "Comuna donde se ubica la central."

      - name: latitude
        description: "Latitud de la central (WGS84)."

      - name: longitude
        description: "Longitud de la central (WGS84)."

      - name: generacion_total_mwh
        description: >
          Total de energía generada por la central en el día (MWh).
        tests:
          - not_null

      - name: generacion_promedio_mw
        description: "Promedio de generación horaria de la central (MW)."

      - name: generacion_maxima_mw
        description: "Máximo de generación horaria de la central (MW)."

      - name: generacion_minima_mw
        description: "Mínimo de generación horaria de la central (MW)."

      - name: potencia_maxima_mw
        description: >
          Capacidad instalada (potencia máxima) de la central en MW.
          Corresponde al MAX reportado en el día.

      - name: factor_planta
        description: >
          Factor de planta diario de la central:
          generacion_total_mwh / (potencia_maxima_mw × 24).

      - name: horas_operacion
        description: "Cantidad de horas en que la central generó energía (>0 MW)."

      - name: horas_con_datos
        description: "Cantidad de horas con registros de generación para la central."

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - fecha
              - id_central

  # ────────────────────────────────────────────────────────────────────────────
  # mart_eficiencia_central
  # ────────────────────────────────────────────────────────────────────────────
  - name: mart_eficiencia_central
    description: >
      Métricas de eficiencia acumuladas por central del SEN. Cada fila
      representa el resumen histórico de rendimiento de una central: generación
      total acumulada, factor de planta promedio, mejor día, tasa de
      disponibilidad, y ubicación geográfica. No tiene dimensión temporal:
      es un snapshot que resume todo el histórico disponible.
      Granularidad: 1 fila por id_central.
      Excluye centrales con estado distinto a 'normal'.
    columns:
      - name: id_central
        description: "Identificador único de la central."
        tests:
          - unique
          - not_null

      - name: nombre_central
        description: "Nombre de la central."
        tests:
          - not_null

      - name: tipo_tecnologia
        description: "Tipo de tecnología de generación."

      - name: clasificacion_fuente
        description: "Clasificación: 'Renovable' o 'Convencional'."
        tests:
          - accepted_values:
              arguments:
                values: ["Renovable", "Convencional"]

      - name: region
        description: "Región administrativa de Chile."

      - name: comuna
        description: "Comuna donde se ubica la central."

      - name: latitude
        description: "Latitud de la central (WGS84). Útil para cruce con datos climáticos."

      - name: longitude
        description: "Longitud de la central (WGS84). Útil para cruce con datos climáticos."

      - name: geo_point
        description: "Punto GEOGRAPHY de BigQuery para análisis espacial y joins geográficos."

      - name: dias_con_datos
        description: "Cantidad de días en que la central tiene registros de generación."
        tests:
          - not_null

      - name: generacion_total_mwh
        description: "Generación total acumulada en MWh durante todo el periodo de datos."
        tests:
          - not_null

      - name: generacion_promedio_diaria_mwh
        description: "Promedio de generación diaria en MWh."

      - name: potencia_maxima_mw
        description: "Capacidad instalada máxima reportada (MW)."

      - name: factor_planta_promedio
        description: >
          Factor de planta promedio calculado como el promedio de los factores
          de planta diarios. Rango esperado: 0.0 a 1.0.

      - name: factor_planta_mejor_dia
        description: >
          Factor de planta del mejor día de rendimiento de la central.
          Útil para identificar el potencial máximo de la central.

      - name: horas_operacion_totales
        description: "Total acumulado de horas en que la central generó energía."

      - name: horas_con_datos_totales
        description: "Total de horas con registros de generación."

      - name: tasa_disponibilidad
        description: >
          Porcentaje del tiempo en que la central estuvo operando:
          horas_operacion_totales / horas_con_datos_totales.
          Rango esperado: 0.0 a 1.0.

  # ────────────────────────────────────────────────────────────────────────────
  # mart_resumen_sistema
  # ────────────────────────────────────────────────────────────────────────────
  - name: mart_resumen_sistema
    description: >
      KPIs globales diarios del Sistema Eléctrico Nacional (SEN) de Chile.
      Cada fila resume el comportamiento del sistema completo en un día:
      generación total, participación renovable vs convencional, demanda
      máxima y mínima (estimada desde la generación), cantidad de centrales
      activas, capacidad instalada total, factor de planta del sistema, y
      la tecnología que más aportó en el día.
      Granularidad: 1 fila por día.
      Excluye centrales con estado distinto a 'normal'.
    columns:
      - name: fecha
        description: "Fecha del día."
        tests:
          - unique
          - not_null

      - name: generacion_total_mwh
        description: "Generación total del sistema en MWh."
        tests:
          - not_null

      - name: generacion_renovable_mwh
        description: >
          Generación total de fuentes renovables (Solar, Eolica, Geotérmica,
          Biomasa, Mini/Hidráulica de Pasada, Biogás) en MWh.

      - name: generacion_convencional_mwh
        description: >
          Generación total de fuentes convencionales (Térmica, etc.) en MWh.

      - name: pct_renovable
        description: >
          Porcentaje de participación de fuentes renovables en la generación
          total del día. Fórmula: (generacion_renovable_mwh /
          generacion_total_mwh) × 100.

      - name: pct_convencional
        description: >
          Porcentaje de participación de fuentes convencionales.

      - name: demanda_maxima_mw
        description: >
          Pico de generación del sistema en una hora del día (MW).
          Se usa como proxy de la demanda máxima del sistema.

      - name: demanda_minima_mw
        description: >
          Valle de generación del sistema en una hora del día (MW).
          Se usa como proxy de la demanda mínima del sistema.

      - name: num_centrales_activas
        description: "Cantidad total de centrales que generaron energía (>0 MW) durante el día."

      - name: num_centrales_renovables_activas
        description: "Cantidad de centrales renovables que generaron energía."

      - name: capacidad_instalada_total_mw
        description: >
          Capacidad instalada total del sistema en MW. Calculada como la
          suma de MAX(potencia_maxima_mw) por central en el día.

      - name: factor_planta_sistema
        description: >
          Factor de planta global del sistema: generacion_total_mwh /
          (capacidad_instalada_total_mw × 24). Indica qué porcentaje de
          la capacidad total se utilizó efectivamente.

      - name: top_tecnologia
        description: >
          Tecnología de generación que aportó la mayor cantidad de energía
          (MWh) al sistema durante el día.
        tests:
          - not_null
